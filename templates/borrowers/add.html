{% extends "base.html" %}

{% block title %}Add Borrower - Loan Tracker{% endblock %}

{% block content %}
<section class="detail-header">
    <div class="page-head">
        <p class="page-kicker">Borrowers</p>
        <h1 class="page-title">Add New Borrower</h1>
        <p class="page-subtitle">Create a clean record with principal and monthly rate.</p>
    </div>
    <div class="detail-actions">
        <a href="/borrowers" class="btn btn-ghost">Back</a>
    </div>
</section>

<section class="form-container fade-up" style="max-width:760px; margin:0 auto;">
    <form method="post" action="/borrowers/add">
        <div class="form-group">
            <label class="form-label" for="name">Borrower Name</label>
            <input type="text" id="name" name="name" class="form-input" placeholder="Enter borrower name" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="principal">Principal Amount</label>
                <input type="number" id="principal" name="principal" class="form-input" placeholder="0.00" step="0.01" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="interest_rate">Interest Rate (% per month)</label>
                <input type="number" id="interest_rate" name="interest_rate" class="form-input" placeholder="0.00" step="0.01" required>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label" for="start_date">Start Date</label>
            <input type="date" id="start_date" name="start_date" class="form-input" required>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Add Borrower</button>
            <a href="/borrowers" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
