{% extends "base.html" %}

{% block title %}Edit {{ borrower.name }} - Loan Tracker{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto animate-fade-in">
    <div class="mb-6">
        <a href="/borrowers/{{ borrower.id }}" class="text-gray-600 hover:text-black mb-4 inline-flex items-center group">
            <svg class="w-5 h-5 mr-1 transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
            Back to Details
        </a>
        <h1 class="text-4xl font-bold text-gray-900 mt-2">Edit Borrower</h1>
        <p class="text-gray-600 mt-2">Update loan information for {{ borrower.name }}</p>
    </div>
    
    <div class="bg-white rounded-xl shadow-lg p-8 border-2 border-gray-100">
        <form method="post" action="/borrowers/{{ borrower.id }}/edit" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    Borrower Name
                </label>
                <input 
                    type="text" 
                    name="name" 
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-black focus:border-transparent transition-all outline-none hover:border-gray-400" 
                    value="{{ borrower.name }}"
                    required
                >
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        Principal Amount
                    </label>
                    <input 
                        type="number" 
                        name="principal" 
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent transition-all outline-none hover:border-gray-400" 
                        value="{{ borrower.principal }}"
                        step="0.01" 
                        required
                    >
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        Interest Rate (% per month)
                    </label>
                    <input 
                        type="number" 
                        name="interest_rate" 
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none hover:border-gray-400" 
                        value="{{ borrower.interest_rate }}"
                        step="0.01" 
                        required
                    >
                </div>
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    Start Date
                </label>
                <input 
                    type="date" 
                    name="start_date" 
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all outline-none hover:border-gray-400" 
                    value="{{ borrower.start_date }}"
                    required
                >
            </div>
            
            <div class="bg-gray-50 p-4 rounded-lg">
                <label class="flex items-center cursor-pointer">
                    <input 
                        type="checkbox" 
                        name="principal_recovered" 
                        class="w-5 h-5 text-green-600 rounded focus:ring-green-500 cursor-pointer"
                        {{ 'checked' if borrower.principal_recovered }}
                    >
                    <span class="ml-3 text-gray-700 font-semibold">Principal Recovered</span>
                </label>
            </div>
            
            <div class="flex space-x-4 pt-4">
                <button 
                    type="submit" 
                    class="flex-1 bg-black text-white py-3 rounded-lg font-semibold hover:bg-gray-800 transform hover:scale-105 transition-all shadow-lg hover:shadow-xl"
                >
                    Save Changes
                </button>
                <a 
                    href="/borrowers/{{ borrower.id }}" 
                    class="flex-1 bg-gray-100 text-gray-700 py-3 rounded-lg font-semibold hover:bg-gray-200 transition-all text-center transform hover:scale-105"
                >
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
