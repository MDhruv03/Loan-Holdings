{% extends "base.html" %}

{% block title %}Edit {{ borrower.name }} - Loan Tracker{% endblock %}

{% block content %}
<section class="detail-header">
    <div class="page-head">
        <p class="page-kicker">Borrowers</p>
        <h1 class="page-title">Edit Borrower</h1>
        <p class="page-subtitle">Adjust details for {{ borrower.name }}.</p>
    </div>
    <div class="detail-actions">
        <a href="/borrowers/{{ borrower.id }}" class="btn btn-ghost">Back</a>
    </div>
</section>

<section class="form-container fade-up" style="max-width:760px; margin:0 auto;">
    <form method="post" action="/borrowers/{{ borrower.id }}/edit">
        <div class="form-group">
            <label class="form-label">Borrower Name</label>
            <input type="text" name="name" class="form-input" value="{{ borrower.name }}" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Principal Amount</label>
                <input type="number" name="principal" class="form-input" value="{{ borrower.principal }}" step="0.01" required>
            </div>

            <div class="form-group">
                <label class="form-label">Interest Rate (% per month)</label>
                <input type="number" name="interest_rate" class="form-input" value="{{ borrower.interest_rate }}" step="0.01" required>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Start Date</label>
            <input type="date" name="start_date" class="form-input" value="{{ borrower.start_date }}" required>
        </div>

        <div class="panel" style="padding:0.8rem; margin:0 0 1rem;">
            <label class="stack-row" style="align-items:center; gap:0.5rem;">
                <input type="checkbox" name="principal_recovered" {{ 'checked' if borrower.principal_recovered }}>
                <span>Principal recovered</span>
            </label>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="/borrowers/{{ borrower.id }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
