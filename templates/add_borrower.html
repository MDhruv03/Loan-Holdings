{% extends "base.html" %}

{% block title %}Add Borrower - Personal Loan Tracker{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-header">
        <h2>Add New Borrower</h2>
        <p class="subtitle">Enter details for a new loan</p>
    </div>

    <form method="post" class="borrower-form">
        <div class="form-group">
            <label for="name">Name *</label>
            <input type="text" id="name" name="name" required>
        </div>

        <div class="form-group">
            <label for="principal">Principal Amount (₹) *</label>
            <input type="number" id="principal" name="principal" step="0.01" min="0" required>
        </div>

        <div class="form-group">
            <label for="interest_rate">Monthly Interest Rate (%) *</label>
            <input type="number" id="interest_rate" name="interest_rate" step="0.01" min="0" required>
        </div>

        <div class="form-group">
            <label for="start_date">Start Date *</label>
            <input type="date" id="start_date" name="start_date" required>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Add Borrower</button>
            <a href="/" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
