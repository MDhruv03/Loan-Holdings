<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticate - Loan Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                        serif: ['Georgia', 'serif'],
                    },
                    colors: {
                        bg: '#0a0a0a',
                        border: '#2a2a2a',
                        textMain: '#eeeeee',
                        textMuted: '#a3a3a3',
                        danger: '#ef4444',
                        success: '#22c55e',
                    }
                },
            },
        };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen font-sans antialiased text-textMain bg-bg flex flex-col justify-center items-center px-6">
    <main class="w-full max-w-sm">
        <div class="mb-12">
            <h1 class="text-2xl font-serif text-white tracking-wider uppercase mb-1">Loan Ledger</h1>
            <p class="text-xs text-textMuted uppercase tracking-wider">Private Desk</p>
        </div>

        {% if error %}
        <div class="mb-8 border-l-2 border-danger pl-4">
            <p class="text-danger text-sm">{{ error }}</p>
        </div>
        {% endif %}

        <form method="post" action="/login" class="space-y-6">
            <div>
                <label for="username" class="block text-xs uppercase tracking-wider text-textMuted mb-2">Username</label>
                <input type="text" id="username" name="username" required autofocus autocomplete="off"
                    class="w-full bg-transparent border-b border-border py-2 text-white focus:outline-none focus:border-white transition-colors"
                    placeholder="Admin">
            </div>

            <div>
                <label for="password" class="block text-xs uppercase tracking-wider text-textMuted mb-2">Password</label>
                <input type="password" id="password" name="password" required
                    class="w-full bg-transparent border-b border-border py-2 text-white focus:outline-none focus:border-white transition-colors"
                    placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;">
            </div>

            <div class="pt-6">
                <button type="submit" 
                    class="w-full border border-white text-black bg-white py-3 uppercase tracking-wider text-sm hover:bg-transparent hover:text-white transition-colors">
                    Authenticate
                </button>
            </div>
        </form>
    </main>
</body>
</html>
