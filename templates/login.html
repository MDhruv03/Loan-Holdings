<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Loan Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main class="login-shell">
        <section class="panel login-panel fade-up">
            <div class="page-head" style="text-align:center;">
                <p class="page-kicker">Secure Access</p>
                <h1 class="page-title">Loan Holdings</h1>
                <p class="page-subtitle">Minimal workspace for loan and balance operations.</p>
            </div>

            {% if error %}
            <div class="panel" style="padding:0.75rem 0.9rem; margin-bottom:0.9rem; border-color:#505050;">
                <p class="tiny" style="color:#e6e6e6;">{{ error }}</p>
            </div>
            {% endif %}

            <form method="post" action="/login">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-input" placeholder="Enter your username" required autofocus>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
            </form>

            <div style="margin-top:0.85rem; text-align:center;" class="tiny">
                <p>Default credentials: admin / admin123</p>
            </div>
        </section>
    </main>
</body>
</html>
