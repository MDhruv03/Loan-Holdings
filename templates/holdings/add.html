{% extends "base.html" %}

{% block title %}Add Holder - Loan Tracker{% endblock %}

{% block content %}
<section class="detail-header">
    <div class="page-head">
        <p class="page-kicker">Holdings</p>
        <h1 class="page-title">Add New Holder</h1>
        <p class="page-subtitle">Create a holder profile for deposits and transfers.</p>
    </div>
    <div class="detail-actions">
        <a href="/holdings" class="btn btn-ghost">Back</a>
    </div>
</section>

<section class="form-container fade-up" style="max-width:760px; margin:0 auto;">
    <form method="post" action="/holdings/add">
        <div class="form-group">
            <label class="form-label">Holder Name</label>
            <input type="text" name="name" class="form-input" placeholder="Enter holder name" required>
        </div>

        <div class="form-group">
            <label class="form-label">Currency</label>
            <select name="currency" class="form-select" required>
                {% for curr in currencies %}
                <option value="{{ curr }}">{{ curr }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label class="form-label">Phone Number (Optional)</label>
            <input type="text" name="phone" class="form-input" placeholder="Enter phone number">
        </div>

        <div class="form-group">
            <label class="form-label">Notes (Optional)</label>
            <textarea name="notes" rows="4" class="form-textarea" placeholder="Add any additional notes"></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Add Holder</button>
            <a href="/holdings" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
