{% extends "base.html" %}

{% block title %}Add Holder - Loan Ledger{% endblock %}

{% block content %}
<section class="max-w-2xl mx-auto mt-12">
    <div class="mb-12">
        <a href="/holdings" class="text-xs uppercase tracking-wider text-textMuted hover:text-white transition-colors border-b border-transparent hover:border-white pb-0.5 mb-8 inline-block">&larr; Return to Holdings</a>
        <h2 class="font-serif text-3xl text-white mb-2">New Holder Account</h2>
        <p class="text-xs text-textMuted uppercase tracking-wider">Establish a cash holding entity</p>
    </div>

    <div class="border border-border p-8">
        <form method="post" action="/holdings/add" class="space-y-8">
            <div>
                <label for="name" class="block text-xs uppercase tracking-wider text-textMuted mb-2">Holder / Entity Name</label>
                <input type="text" id="name" name="name" required autocomplete="off"
                    class="w-full bg-transparent border-b border-border py-2 text-white focus:outline-none focus:border-white transition-colors">
            </div>

            <div>
                <label for="currency" class="block text-xs uppercase tracking-wider text-textMuted mb-2">Denomination Currency</label>
                <select id="currency" name="currency" required 
                    class="w-full bg-bg border-b border-border py-2 text-white focus:outline-none focus:border-white transition-colors [color-scheme:dark]">
                    {% for curr in currencies %}
                    <option value="{{ curr }}">{{ curr }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label for="phone" class="block text-xs uppercase tracking-wider text-textMuted mb-2">Contact Reference (Optional)</label>
                <input type="text" id="phone" name="phone"
                    class="w-full bg-transparent border-b border-border py-2 text-white focus:outline-none focus:border-white transition-colors">
            </div>

            <div>
                <label for="notes" class="block text-xs uppercase tracking-wider text-textMuted mb-2">Additional Directives (Optional)</label>
                <textarea id="notes" name="notes" rows="3"
                    class="w-full bg-transparent border border-border py-2 px-3 text-white focus:outline-none focus:border-white transition-colors"></textarea>
            </div>

            <div class="pt-8 border-t border-border flex flex-col sm:flex-row gap-4">
                <button type="submit" 
                    class="border border-white bg-white text-black py-3 px-8 uppercase tracking-wider text-sm hover:bg-transparent hover:text-white transition-colors">
                    Commit Holder
                </button>
                <a href="/holdings" 
                    class="border border-border text-white py-3 px-8 text-center uppercase tracking-wider text-sm hover:border-textMuted transition-colors">
                    Discard
                </a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
