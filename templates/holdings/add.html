{% extends "base.html" %}

{% block title %}Add Holder - Loan Tracker{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto animate-fade-in">
    <div class="mb-6">
        <a href="/holdings" class="text-gray-600 hover:text-black mb-4 inline-flex items-center group">
            <svg class="w-5 h-5 mr-1 transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
            Back to Holdings
        </a>
        <h1 class="text-4xl font-bold text-gray-900 mt-2">Add New Holder</h1>
        <p class="text-gray-600 mt-2">Create a new holder account</p>
    </div>
    
    <div class="bg-white rounded-xl shadow-lg p-8 border-2 border-gray-100">
        <form method="post" action="/holdings/add" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    Holder Name
                </label>
                <input 
                    type="text" 
                    name="name" 
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-black focus:border-transparent transition-all outline-none hover:border-gray-400" 
                    placeholder="Enter holder name"
                    required
                >
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    Currency
                </label>
                <select 
                    name="currency" 
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent transition-all outline-none hover:border-gray-400 cursor-pointer"
                    required
                >
                    {% for curr in currencies %}
                    <option value="{{ curr }}">{{ curr }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    Phone Number (Optional)
                </label>
                <input 
                    type="text" 
                    name="phone" 
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none hover:border-gray-400" 
                    placeholder="Enter phone number"
                >
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    Notes (Optional)
                </label>
                <textarea 
                    name="notes" 
                    rows="4"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent transition-all outline-none hover:border-gray-400 resize-none" 
                    placeholder="Add any additional notes..."
                ></textarea>
            </div>
            
            <div class="flex space-x-4 pt-4">
                <button 
                    type="submit" 
                    class="flex-1 bg-black text-white py-3 rounded-lg font-semibold hover:bg-gray-800 transform hover:scale-105 transition-all shadow-lg hover:shadow-xl"
                >
                    Add Holder
                </button>
                <a 
                    href="/holdings" 
                    class="flex-1 bg-gray-100 text-gray-700 py-3 rounded-lg font-semibold hover:bg-gray-200 transition-all text-center transform hover:scale-105"
                >
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
