<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Loan Ledger{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                        serif: ['Georgia', 'serif'],
                    },
                    colors: {
                        bg: '#0a0a0a',
                        surface: '#111111',
                        border: '#2a2a2a',
                        textMain: '#eeeeee',
                        textMuted: '#a3a3a3',
                        danger: '#ef4444',
                        success: '#22c55e',
                    }
                },
            },
        };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="bg-bg text-textMain font-sans antialiased min-h-screen">
    
    <div class="max-w-screen-xl mx-auto flex flex-col min-h-screen px-6">
        
        <header class="py-12 border-b border-border flex flex-col md:flex-row md:items-end justify-between gap-6">
            <div>
                <a href="/" class="group block">
                    <h1 class="text-2xl font-serif text-white tracking-wider uppercase mb-1">Loan Ledger</h1>
                    <p class="text-xs text-textMuted uppercase tracking-wider">Private Desk</p>
                </a>
            </div>

            <nav class="flex items-center gap-6 text-sm">
                <a href="/borrowers" class="hover:text-white transition-colors {{ 'text-white border-b border-white pb-1' if request.url.path.startswith('/borrowers') else 'text-textMuted' }}">Borrowers</a>
                <a href="/holdings" class="hover:text-white transition-colors {{ 'text-white border-b border-white pb-1' if request.url.path.startswith('/holdings') else 'text-textMuted' }}">Holdings</a>
                <a href="/logout" class="text-textMuted hover:text-danger transition-colors">Logout</a>
            </nav>
        </header>

        <main class="flex-1 py-12">
            {% block content %}{% endblock %}
        </main>

        <footer class="py-8 border-t border-border mt-auto">
            <p class="text-sm text-textMuted">&copy; 2026 Loan Ledger.</p>
        </footer>

    </div>
</body>
</html>
