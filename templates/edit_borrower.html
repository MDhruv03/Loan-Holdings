{% extends "base.html" %}

{% block title %}Edit {{ borrower.name }} - Personal Loan Tracker{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-header">
        <h2>Edit Borrower</h2>
        <p class="subtitle">Update loan details for {{ borrower.name }}</p>
    </div>

    <form method="post" class="borrower-form">
        <div class="form-group">
            <label for="name">Name *</label>
            <input type="text" id="name" name="name" value="{{ borrower.name }}" required>
        </div>

        <div class="form-group">
            <label for="principal">Principal Amount (₹) *</label>
            <input type="number" id="principal" name="principal" step="0.01" min="0" 
                   value="{{ borrower.principal }}" required>
        </div>

        <div class="form-group">
            <label for="interest_rate">Monthly Interest Rate (%) *</label>
            <input type="number" id="interest_rate" name="interest_rate" step="0.01" min="0" 
                   value="{{ borrower.interest_rate }}" required>
        </div>

        <div class="form-group">
            <label for="start_date">Start Date *</label>
            <input type="date" id="start_date" name="start_date" 
                   value="{{ borrower.start_date }}" required>
        </div>

        <div class="form-group">
            <label class="checkbox-label">
                <input type="checkbox" name="principal_recovered" 
                       {% if borrower.principal_recovered %}checked{% endif %}>
                Principal has been recovered
            </label>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Update Borrower</button>
            <a href="/borrower/{{ borrower.id }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
